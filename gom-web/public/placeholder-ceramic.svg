<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet" role="img" aria-label="No ceramic image available">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="vase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Surface line -->
  <line x1="60" y1="320" x2="340" y2="320" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 6"/>

  <!-- Vase silhouette -->
  <g transform="translate(200 200)">
    <path d="
      M -38 -110
      L  38 -110
      L  34 -94
      C  62 -78 78 -50 78 -16
      C  78  20 60  56 32  78
      L  34 110
      L -34 110
      L -32  78
      C -60  56 -78 20 -78 -16
      C -78 -50 -62 -78 -34 -94
      Z
    " fill="url(#vase)" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>

    <!-- Decorative band -->
    <ellipse cx="0" cy="-12" rx="78" ry="10" fill="none" stroke="#cbd5e1" stroke-width="2" opacity="0.7"/>
    <ellipse cx="0" cy="20"  rx="76" ry="9"  fill="none" stroke="#cbd5e1" stroke-width="2" opacity="0.5"/>

    <!-- Highlight -->
    <path d="M -50 -50 C -64 -20 -64 20 -50 50" fill="none" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Caption -->
  <text x="200" y="365"
        font-family="Inter, 'Segoe UI', Roboto, sans-serif"
        font-size="14"
        font-weight="600"
        fill="#64748b"
        text-anchor="middle"
        letter-spacing="0.5">
    No image available
  </text>
</svg>
